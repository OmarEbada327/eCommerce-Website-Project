<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — SILICON HOUSE</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/register.css">
    <link rel="stylesheet" href="../assets/css/home.css">
    <link rel="stylesheet" href="../assets/css/orders.css">
</head>

<body>
    <header class="site-nav">
        <div class="site-nav-inner">
            <a href="../index.html" class="brand" aria-label="Silicon House home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B8742E" stroke-width="2"
                    aria-hidden="true">
                    <rect x="4" y="4" width="16" height="16" rx="2" />
                    <rect x="9" y="9" width="6" height="6" />
                    <path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2" />
                </svg>
                <span>SILICON&nbsp;HOUSE</span>
            </a>
            <nav class="nav-links">
                <a href="../index.html">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>
                    All
                </a>
            </nav>
            <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu"
                aria-expanded="false"><span></span><span></span><span></span></button>
            <div class="nav-actions">
                <a class="cart-btn" href="cart.html" aria-label="View cart"><svg width="18" height="18"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="9" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                    </svg><span id="cartCount" class="cart-count">0</span></a>

                <span id="userGreeting" class="user-greeting initially-hidden"></span>

                <div class="auth-actions">
                    <a href="admin/orders.html" id="allOrdersAdminLink"
                        class="btn-ghost-small initially-hidden">All orders</a>
                    <a href="admin/products.html" id="adminLink"
                        class="btn-ghost-small initially-hidden">Admin</a>
                    <button id="signOutBtn" class="btn-ghost-small" type="button">Sign out</button>
                </div>
            </div>
        </div>
    </header>

    <main class="orders-page">
        <svg class="page-traces" viewBox="0 0 920 220" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
            <path d="M0 50 H200 V150 H460" stroke="#4FD1C5" stroke-width="1.5" fill="none" />
            <path d="M920 40 H700 V160 H360" stroke="#B8742E" stroke-width="1.5" fill="none" />
            <path d="M0 200 H120 V160" stroke="#4FD1C5" stroke-width="1.5" fill="none" opacity="0.7" />
            <path d="M200 150 V210 H340" stroke="#B8742E" stroke-width="1.5" fill="none" opacity="0.6" />
            <path d="M460 150 V90 H620" stroke="#4FD1C5" stroke-width="1.5" fill="none" opacity="0.6" />
            <path d="M920 190 H820 V110" stroke="#4FD1C5" stroke-width="1.5" fill="none" opacity="0.6" />
            <path d="M620 0 V40" stroke="#B8742E" stroke-width="1.5" fill="none" opacity="0.5" />
            <rect x="608" y="78" width="20" height="20" rx="3" fill="none" stroke="#4FD1C5" stroke-width="1.2" opacity="0.8" />
            <rect x="808" y="98" width="16" height="16" rx="3" fill="none" stroke="#B8742E" stroke-width="1.2" opacity="0.7" />
            <circle cx="200" cy="150" r="3.5" fill="#4FD1C5" />
            <circle cx="700" cy="160" r="3.5" fill="#B8742E" />
            <circle cx="120" cy="160" r="3" fill="#4FD1C5" />
            <circle cx="340" cy="210" r="3" fill="#B8742E" />
            <circle cx="620" cy="40" r="3" fill="#B8742E" />
            <circle cx="820" cy="110" r="3" fill="#4FD1C5" />
        </svg>
        <div class="orders-page-inner">
            <div class="orders-heading">
                <div>
                    <p class="eyebrow">Account</p>
                    <h1>My orders</h1>
                    <p>Track every part of your build, from checkout to delivery.</p>
                </div><a class="btn-ghost-small" href="../index.html">Continue shopping</a>
            </div>
            <div id="ordersLoading" class="orders-loading" aria-live="polite"><span></span><span></span><span></span>
                <p>Loading your orders...</p>
            </div>
            <section id="ordersEmpty" class="orders-empty hidden">
                <div class="empty-icon">⌁</div>
                <h2>No orders yet</h2>
                <p>Your completed orders will appear here.</p><a class="submit-btn" href="../index.html">Browse
                    products</a>
            </section>
            <section id="ordersError" class="orders-error hidden" role="alert"><strong>Couldn't load your
                    orders.</strong><span id="ordersErrorText"></span><button id="retryBtn" class="btn-ghost-small"
                    type="button">Try again</button></section>
            <section id="ordersList" class="orders-list hidden" aria-live="polite"></section>
        </div>
    </main>

    <footer class="site-footer">
        <svg class="footer-traces" viewBox="0 0 1200 80" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
            <path d="M0 20 H300 V60 H700 V30 H1200" stroke="#4FD1C5" stroke-width="1.5" fill="none" />
            <path d="M150 80 V50 H400" stroke="#B8742E" stroke-width="1.5" fill="none" opacity="0.7" />
            <path d="M900 80 V45 H1050 V10" stroke="#4FD1C5" stroke-width="1.5" fill="none" opacity="0.6" />
            <circle cx="300" cy="60" r="3" fill="#B8742E" />
            <circle cx="700" cy="30" r="3" fill="#4FD1C5" />
            <circle cx="400" cy="50" r="2.5" fill="#B8742E" />
            <circle cx="1050" cy="10" r="2.5" fill="#4FD1C5" />
        </svg>
        <div class="site-footer-inner"><span>SILICON HOUSE</span><span class="footer-note">Backend: <span
                    id="apiStatus">checking...</span></span></div>
    </footer>
    <div class="toast" id="toast"></div>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/responsive-nav.js"></script>
    <script src="../assets/js/orders.js"></script>
</body>

</html>
