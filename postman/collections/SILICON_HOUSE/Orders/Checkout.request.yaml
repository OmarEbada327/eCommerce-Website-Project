$kind: http-request
description: Creates a new order from the authenticated user’s cart in the **SILICON_HOUSE** eCommerce system. This request is used during checkout to finalize the purchase process, converting selected cart items into an order for processing and fulfillment.
url: "{{baseUrl}}/orders/checkout"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \    \"paymentMethod\": \"cash_on_delivery\",\r

    \    \"shippingAddress\": {\r

    \        \"street\": \"Haram street\",\r

    \        \"city\": \"Giza\",\r

    \        \"state\": \"Giza\",\r

    \        \"zip\": \"12556\",\r

    \        \"country\": \"Egypt\"\r

    \    }\r

    }"
scripts:
  - type: afterResponse
    code: "const data = pm.response.json();\r

      if (data && data._id) { pm.collectionVariables.set('orderId', data._id); }"
    language: text/javascript
order: 1000
