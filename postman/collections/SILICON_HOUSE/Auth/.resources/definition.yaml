description: This folder contains the core API requests for the **SILICON_HOUSE** eCommerce system, organized by feature area. It includes endpoints for **authentication** (login and registration), **product management** (listing, retrieving, creating, updating, and deleting products), **cart operations** (adding, updating, removing, clearing, and viewing cart items), **order processing** (checkout, viewing orders, retrieving order details, canceling orders, and updating order status), and **user management** (profile retrieval and update, plus admin-only user deletion). Overall, this folder serves as the main collection structure for testing and managing the application's customer and admin API workflows.
order: 1000
