$kind: http-request
description: Creates a new user account by sending the user’s registration details to the authentication endpoint. This request uses the POST method with a JSON body containing the user’s name, email, password, phone number, and role. It does not require authentication, which makes it suitable for onboarding new users into the system.
url: "{{baseUrl}}/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \    \"name\": \"Admin man\",\r

    \    \"email\": \"admin@test.com\",\r

    \    \"password\": \"123456\",\r

    \    \"phone\": \"01000000000\",\r

    \    \"role\": \"admins\"\r

    }"
auth:
  type: noauth
order: 1000
