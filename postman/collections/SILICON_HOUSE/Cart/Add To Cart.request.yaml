$kind: http-request
description: Adds a selected product to the authenticated user’s shopping cart in the **SILICON_HOUSE** eCommerce system. This request is used to begin or update the shopping process by placing an item into the cart for future checkout.
url: "{{baseUrl}}/cart"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \    \"productId\": \"{{ptoductId}}\",\r

    \    \"quantity\": 1\r

    }"
order: 2000
